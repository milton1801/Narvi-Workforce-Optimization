<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Narvi.css">
  <title>Narvi Workforce OPT</title>
</head>
<body>
  <!-- BAR PRINCIPAL -->
  <div id="titl" >
      <p id="on">Narvi Workforce Optimization</p>
  </div>
  <hr id="lin1">
  <!-- BAR LIST -->
  <ul id="bar">
    <button><li>Dashboard</li></button>
    <button><li>Dispatch Intelligence</li></button>
    <button><li>Reports</li></button>
    <button><li>Settings</li></button>
  </ul>
  <!-- Dispatch Assistant -->
  <button id="d0">
    <img src="https://img.freepik.com/free-vector/graident-ai-robot-vectorart_78370-4114.jpg?semt=ais_rp_progressive&w=740&q=80" alt="">
    <p id="d1">
      Should I generate new driver routes?
    </p>
    <p id="d2">
      Hello! I can optimize your routes.
    </p>
    <p id="d3">
      <b>AI DISPATCH ASSISTANT</b>
    </p>
  </button>
  <!-- OPTIMIZE ROUTE -->
  <button id="or0">
    <p id="or2"> I can optimize your routes for faster
    delivery - should I generate a new route</p>
    <button id="or1">Generate Routes</button>
  </button>
  <!-- PERFORMANCE CHART -->
  <div id="pc1">
    <div id="pc2">
      <strong>Dispatch Performance</strong> Chart
    </div>
    <hr>
    <div id="pc3">
      On-Time Deliveries
      <div id="pc4">%</div><hr>
    </div>
    <div id="pc5">
      Orders Completed
    </div>
  </div>
</body>
</html>
